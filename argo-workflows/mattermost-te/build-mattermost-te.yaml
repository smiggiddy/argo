apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: mattermost-te-build-
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: repo
        value: https://github.com/mattermost/mattermost.git
      # renovate: datasource=github-releases depName=mattermost/mattermost
      - name: mm-version
        value: "v11.6.1"
      - name: image
        value: mattermost-te
      # renovate: datasource=docker depName=ubuntu
      - name: base-image-tag
        value: "noble-20260217"
      - name: base-image-arm64-digest
        value: "sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c"

  templates:
    - name: main
      dag:
        tasks:
          - name: build
            template: build-image

    - name: build-image
      inputs:
        artifacts:
          - name: source
            path: /src
            git:
              repo: "{{workflow.parameters.repo}}"
              revision: "{{workflow.parameters.mm-version}}"
              depth: 1
              singleBranch: true
              branch: master
      volumes:
        - name: docker-config
          secret:
            secretName: cr-smigz-com-registry
        - name: ca-cert
          secret:
            secretName: smigtech-ca-cert
      container:
        image: quay.io/buildah/stable:v1.43.0
        volumeMounts:
          - name: docker-config
            mountPath: /.docker
          - name: ca-cert
            mountPath: /tmp/ca-cert
        workingDir: /src/server/build
        env:
          - name: STORAGE_DRIVER
            value: vfs
          - name: BUILDAH_FORMAT
            value: docker
          - name: DOCKER_CONFIG
            value: /.docker
        command: ["/bin/bash"]
        args:
          - "-c"
          - |
            set -euo pipefail

            MM_VERSION="{{workflow.parameters.mm-version}}"
            MM_VERSION_NUM="${MM_VERSION#v}"
            IMAGE="cr.smigz.com/{{workflow.parameters.image}}:${MM_VERSION_NUM}"
            MM_PACKAGE="https://releases.mattermost.com/${MM_VERSION_NUM}/mattermost-team-${MM_VERSION_NUM}-linux-arm64.tar.gz"
            BASE_TAG="{{workflow.parameters.base-image-tag}}"
            ARM64_DIGEST="{{workflow.parameters.base-image-arm64-digest}}"

            echo "Building Mattermost Team Edition ${MM_VERSION_NUM} for linux/arm64"
            echo "Package URL: ${MM_PACKAGE}"
            echo "Base image: ubuntu:${BASE_TAG}@${ARM64_DIGEST}"

            # --- Patch Dockerfile for ARM64 ---

            # 1. Replace base image tag and pin ARM64 digest
            sed -i "s|FROM ubuntu:[^@]*@sha256:[a-f0-9]*|FROM ubuntu:${BASE_TAG}@${ARM64_DIGEST}|" Dockerfile

            # 2. Replace individual library COPY lines with ldd-based approach
            #    The upstream paths (/usr/lib/libpng.so*) don't match arm64 naming
            #    (e.g. libpng16.so* at /usr/lib/aarch64-linux-gnu/), so we gather
            #    all needed libs dynamically using ldd in the builder stage.
            cat > /tmp/patch.awk << 'AWKEOF'
            /^# Final stage/ {
              print "# Add self-signed CA cert"
              print "COPY smigtech.pem /usr/local/share/ca-certificates/ca.crt"
              print "RUN update-ca-certificates"
              print ""
              print "# Gather shared libraries needed by document processing binaries"
              print "RUN mkdir -p /staging/usr/lib && \\"
              print "  for bin in /usr/bin/pdftotext /usr/bin/wvText /usr/bin/wvWare /usr/bin/unrtf /usr/bin/tidy; do \\"
              print "    for lib in $(ldd \"$bin\" 2>/dev/null | grep -oE \"/usr/lib/[^ ]+\" || true); do \\"
              print "      cp -L \"$lib\" /staging/usr/lib/ 2>/dev/null || true; \\"
              print "    done; \\"
              print "  done"
              print ""
            }
            /^COPY --from=builder \/usr\/lib\/lib/ { next }
            /^# Copy necessary libraries/ {
              print "# Copy necessary libraries for document processing utilities"
              print "COPY --from=builder /staging/usr/lib/ /usr/lib/"
              next
            }
            { print }
            AWKEOF
            awk -f /tmp/patch.awk Dockerfile > Dockerfile.tmp && mv Dockerfile.tmp Dockerfile

            # --- Verify patches applied ---
            if ! grep -q "FROM ubuntu:${BASE_TAG}@${ARM64_DIGEST}" Dockerfile; then
              echo "ERROR: Failed to set ARM64 base image digest"
              echo "FROM line is: $(grep '^FROM' Dockerfile | head -1)"
              exit 1
            fi

            if ! grep -q '/staging/usr/lib/' Dockerfile; then
              echo "ERROR: Failed to patch library gathering step"
              exit 1
            fi

            echo "=== Patched Dockerfile ==="
            cat Dockerfile
            echo "=========================="

            # Copy CA cert from mounted secret into build context
            cp /tmp/ca-cert/smigtech.pem .

            # --- Build and push ---
            buildah build \
              --platform=linux/arm64 \
              --build-arg MM_PACKAGE="${MM_PACKAGE}" \
              -t "${IMAGE}" \
              .

            buildah push "${IMAGE}"

            echo "Successfully built and pushed ${IMAGE}"
