apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho
  labels:
    app: honcho
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: honcho
  template:
    metadata:
      labels:
        app: honcho
    spec:
      containers:
        - name: api
          image: ghcr.io/plastic-labs/honcho
          # mirrors docker/entrypoint.sh (provision_db then fastapi on 8000),
          # plus configure_embeddings: migrations create vector columns at the
          # 1536 default, and this idempotently alters them to
          # EMBEDDING_VECTOR_DIMENSIONS (refuses if real embeddings exist)
          command:
            - sh
            - -c
            - |
              set -e
              /app/.venv/bin/python scripts/provision_db.py
              /app/.venv/bin/python scripts/configure_embeddings.py --yes
              exec /app/.venv/bin/fastapi run --host 0.0.0.0 src/main.py
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: honcho-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: honcho-pg-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: honcho-pg-app
                  key: password
            - name: DB_CONNECTION_URI
              value: "postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@honcho-pg-rw:5432/honcho"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
