apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smigz

resources:
  - ./deployment.yaml
  - ./service.yaml
  - ./ingress.yaml
  - ./job-migrations.yaml
  - ./networkpolicy.yaml
  - ./cronjob-streak-rollover.yaml
  - ./cronjob-weekly-rotation.yaml

# Tag bumped here on each deploy. The build workflow pushes a tag, then this
# value is updated and the argo repo committed — that's what triggers ArgoCD.
images:
  - name: cr.smigz.com/the-method
    newTag: dc49cfb
