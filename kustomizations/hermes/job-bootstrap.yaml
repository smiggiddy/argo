apiVersion: batch/v1
kind: Job
metadata:
  name: hermes-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              uid=10000
              gid=10000
              data_dir=/opt/data
              ssh_dir="${data_dir}/.ssh"
              key_file="${ssh_dir}/hermes_ed25519"
              tmp_key="${key_file}.tmp"

              create_dir() {
                path="${data_dir}/$1"
                mode="$2"
                if [ ! -d "${path}" ]; then
                  mkdir -p "${path}"
                  chmod "${mode}" "${path}"
                fi
                chown "${uid}:${gid}" "${path}"
              }

              mkdir -p "${ssh_dir}"
              touch "${data_dir}/.container-mode"

              for dir in audio_cache cron hooks image_cache logs memories pairing sessions skills; do
                create_dir "${dir}" 700
              done

              for dir in bin cache home plans sandboxes skins workspace; do
                create_dir "${dir}" 2775
              done

              base64 -d /bootstrap-secrets/ssh_private_key > "${tmp_key}"
              test -s "${tmp_key}"

              if ! cmp -s "${tmp_key}" "${key_file}"; then
                mv "${tmp_key}" "${key_file}"
              else
                rm "${tmp_key}"
              fi

              chown "${uid}:${gid}" "${data_dir}/.container-mode" "${ssh_dir}" "${key_file}"
              chmod 700 "${ssh_dir}"
              chmod 600 "${key_file}"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: bootstrap-secrets
              mountPath: /bootstrap-secrets
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: bootstrap-secrets
          secret:
            secretName: hermes-bootstrap-secrets
---
