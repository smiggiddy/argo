# Single gateway process serves all profiles (default = telegram,
# family = mattermost). Secondary profiles get creds via their own
# $HERMES_HOME/profiles/<name>/.env, not process env.
# MUST be top-level: load_gateway_config() only maps the top-level key from
# config.yaml; a nested gateway.multiplex_profiles is silently ignored
# (the nested fallback in from_dict only sees legacy gateway.json). See NOTES.md.
multiplex_profiles: true

display:
  tool_progress_command: true

memory:
  provider: honcho

model:
  default: "qwen3.6-35b-a3b"
  # default: "qwen/qwen3.6-27b"
  provider: "lmstudio"
  base_url: "http://smig-mpb-llm.lab.smig.tech:1234/v1"
  context_length: 131072

providers:
  qwen-small:
    name: "qwen-small"
    base_url: "http://smig-inference.lab.smig.tech:8080/v1"
    model: "qwen3-8b"
    discover_models: true

# Side tasks (context compression, web extraction) run on the small qwen box
# instead of following the main model onto LM Studio. provider: custom is
# required — a bare base_url without api_key falls through to auto, which
# targets the main provider with the overridden model name and 400s.
# vision stays on auto — qwen3-8b is text-only.
auxiliary:
  compression:
    provider: "custom"
    base_url: "http://smig-inference.lab.smig.tech:8080/v1"
    model: "qwen3-8b"
    timeout: 300 # default 120s; local model summarizing 64K contexts needs headroom
  web_extract:
    provider: "custom"
    base_url: "http://smig-inference.lab.smig.tech:8080/v1"
    model: "qwen3-8b"

model_aliases:
  gemma:
    model: "unsloth/gemma-4-26b-a4b-it-qat"
    provider: lmstudio
    base_url: "http://smig-mpb-llm.lab.smig.tech:1234/v1"
  qwen-small:
    model: "qwen3-8b"
    provider: custom
    base_url: "http://smig-inference.lab.smig.tech:8080/v1"
  qwen-big:
    model: "qwen3.6-35b-a3b"
    # model: "qwen/qwen3.6-27b"
    provider: lmstudio
    base_url: "http://smig-mpb-llm.lab.smig.tech:1234/v1"
