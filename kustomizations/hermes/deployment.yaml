# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  labels:
    app: hermes-agent
spec:
  selector:
    matchLabels:
      app: hermes-agent
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container:  hermes-agent
      labels:
        app: hermes-agent
    spec:
      securityContext:
        fsGroup: 10000
      initContainers:
      - name: bootstrap-data
        image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
        - sh
        - -ec
        - |
          uid=10000
          gid=10000
          data_dir=/opt/data

          create_dir() {
            path="${data_dir}/$1"
            mode="$2"
            if [ ! -d "${path}" ]; then
              mkdir -p "${path}"
              chmod "${mode}" "${path}"
            fi
            chown "${uid}:${gid}" "${path}"
          }

          for dir in audio_cache cron hooks image_cache logs memories pairing sessions skills; do
            create_dir "${dir}" 700
          done

          for dir in bin cache home plans sandboxes skins workspace; do
            create_dir "${dir}" 2775
          done

          # freeze the bundled-skill set: presence of this marker disables
          # hermes' skills seeding sync (trimmed skills stay trimmed)
          touch "${data_dir}/.no-bundled-skills"
          chown "${uid}:${gid}" "${data_dir}/.no-bundled-skills"
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - name: data
          mountPath: /opt/data
      containers:
      - name: hermes-agent
        image: nousresearch/hermes-agent
        args: [gateway, run]
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 1
            memory: 1Gi
        envFrom:
          - secretRef:
              name: hermes-secrets
          - configMapRef:
              name: hermes-configmap-1
        ports:
        - containerPort: 8642
          name: hermes-agent
        volumeMounts:
        - name: data
          mountPath: /opt/data
        - name: managed-config
          mountPath: /etc/hermes
          readOnly: true
        - name: tools
          mountPath: /opt/tools
          readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: managed-config
          configMap:
            name: hermes-config-file
        - name: tools
          image:
            reference: cr.smigz.com/image-volume:latest
            pullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
---
