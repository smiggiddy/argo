# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  labels:
    app: hermes-agent
spec:
  selector:
    matchLabels:
      app: hermes-agent
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container:  hermes-agent
      labels:
        app: hermes-agent
    spec:
      securityContext:
        fsGroup: 10000
      initContainers:
      - name: bootstrap-data
        image: busybox:1.36
        command:
        - sh
        - -ec
        - |
          uid=10000
          gid=10000
          data_dir=/opt/data
          ssh_dir="${data_dir}/.ssh"
          key_file="${ssh_dir}/hermes_ed25519"
          tmp_key="${key_file}.tmp"

          create_dir() {
            path="${data_dir}/$1"
            mode="$2"
            if [ ! -d "${path}" ]; then
              mkdir -p "${path}"
              chmod "${mode}" "${path}"
            fi
            chown "${uid}:${gid}" "${path}"
          }

          mkdir -p "${ssh_dir}"

          for dir in audio_cache cron hooks image_cache logs memories pairing sessions skills; do
            create_dir "${dir}" 700
          done

          for dir in bin cache home plans sandboxes skins workspace; do
            create_dir "${dir}" 2775
          done

          base64 -d /bootstrap-secrets/ssh_private_key > "${tmp_key}"
          test -s "${tmp_key}"

          if ! cmp -s "${tmp_key}" "${key_file}"; then
            mv "${tmp_key}" "${key_file}"
          else
            rm "${tmp_key}"
          fi

          chown "${uid}:${gid}" "${data_dir}/.container-mode" "${ssh_dir}" "${key_file}"
          chmod 700 "${ssh_dir}"
          chmod 600 "${key_file}"
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - name: data
          mountPath: /opt/data
        - name: bootstrap-secrets
          mountPath: /bootstrap-secrets
          readOnly: true
      containers:
      - name: hermes-agent
        image: nousresearch/hermes-agent
        args: [gateway, run]
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 1
            memory: 1Gi
        envFrom:
          - secretRef:
              name: hermes-secrets
          - configMapRef:
              name: hermes-configmap-1
        ports:
        - containerPort: 8642
          name: hermes-agent
        volumeMounts:
        - name: data
          mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes
        - name: bootstrap-secrets
          secret:
            secretName: hermes-bootstrap-secrets
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
---
