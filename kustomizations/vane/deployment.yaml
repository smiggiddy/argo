apiVersion: apps/v1
kind: Deployment
metadata:
  name: vane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vane
  template:
    metadata:
      labels:
        app: vane
    spec:
      containers:
        - name: vane
          image: itzcrazykns1337/perplexica:slim-latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: SEARXNG_API_URL
              value: "http://searxng.ai.svc.cluster.local:8080"
          volumeMounts:
            - name: perplexica-data
              mountPath: /home/vane/data
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: "256Mi"
              cpu: "300m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: perplexica-data
          persistentVolumeClaim:
            claimName: perplexica-data
