apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg
  namespace: authentik
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17-bookworm
  instances: 3
  storage:
    size: 4Gi
  resources:
    requests:
      memory: "384Mi"
      cpu: "500m"
    limits:
      memory: "384Mi"
      cpu: "500m"
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      encoding: UTF8
      localeCType: C
      localeCollate: C
      secret:
        name: authentik-postgres-credentials

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: authentik-pg
