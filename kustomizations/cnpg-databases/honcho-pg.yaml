apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: honcho-pg
  namespace: ai
spec:
  # pgvector isn't shipped in the stock CNPG catalog images; the pgvector
  # catalog carries the major version explicitly because the upstream pg17
  # tag doesn't pass the webhook's version parsing as a bare imageName
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: pgvector
    major: 17
  instances: 1
  storage:
    size: 5Gi
    storageClass: longhorn
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1"
  bootstrap:
    initdb:
      database: honcho
      owner: honcho
      encoding: UTF8
      localeCType: C
      localeCollate: C
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
