apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: apps
    repoURL: https://github.com/smiggiddy/argo
    # helm:
    #   valueFiles:
    #     - values.yaml
  syncPolicy:
    automated:
      # prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
