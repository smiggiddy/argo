apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bentopdf
  namespace: argocd
  labels:
    apps: utilities 
  annotations:
    {{ include "app.notifications" . | nindent 4 }}

spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: HEAD
    path: ./kustomizations/bentopdf
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: apps
  {{ include "app.syncPolicy.automated" . | nindent 2 }}
