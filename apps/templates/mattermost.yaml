apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mattermost-root
  namespace: argocd
  labels:
    apps: utilities
  annotations:
    {{ include "app.notifications" . | nindent 4 }}
spec:
  project: default
  source:
    path: './mattermost'
    repoURL: 'https://github.com/smiggiddy/argo'
    targetRevision: HEAD
  destination:
    namespace: mattermost
    server: 'https://kubernetes.default.svc'
  {{ include "app.syncPolicy.automated" . | nindent 2 }}
