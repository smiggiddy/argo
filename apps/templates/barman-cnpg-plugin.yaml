apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: barman-cnpg
  namespace: argocd
  labels:
    apps: utilities
  annotations:
    {{ include "app.notifications" . | nindent 4 }}

spec:
  project: default
  source:
    path: './kustomizations/barman-cnpg-plugin'
    repoURL: {{ .Values.repoURL }}
    targetRevision: HEAD
  destination:
    namespace: cnpg-system
    server: 'https://kubernetes.default.svc'
  {{ include "app.syncPolicy.automated" . | nindent 2 }}

