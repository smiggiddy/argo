apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-databases
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/smiggiddy/argo'
    targetRevision: HEAD
    path: ./kustomizations/cnpg-databases
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
