apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  labels:
    apps: utilities 
    software: database
  annotations:
    {{ include "app.notifications" . | nindent 4 }}
  # annotations:
  #  avp.kubernetes.io/ignore: "true"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts 
    targetRevision: 0.27.1
    chart: cloudnative-pg

    # helm:
    #   valuesObject:

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: cnpg-system

  {{ include "app.syncPolicy.automated" . | nindent 2 }}
