apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: excalidraw
  namespace: argocd
  labels:
    apps: development
    smig: charts
  annotations:
    {{ include "app.notifications" . | nindent 4 }}
spec:
  project: default
  source:
    repoURL: git.thecodedom.com/smig
    targetRevision: 0.1.0
    chart: excalidraw
    helm:
      valuesObject:
          image:
            repository: excalidraw/excalidraw
            # This sets the pull policy for images.
            pullPolicy: IfNotPresent
            # Overrides the image tag whose default is the chart appVersion.
            tag: "latest"

          ingress:
            enabled: true
            className: "traefik"
            annotations: 
              cert-manager.io/cluster-issuer: cluster-ca-issuer
              external-dns.alpha.kubernetes.io/target: "k3s.lab.smig.tech."
            hosts:
            - host: excalidraw.lab.smig.tech
              paths:
              - path: /
                pathType: Prefix
            tls: 
            - secretName: excalidraw-tls
              hosts:
              - excalidraw.lab.smig.tech




  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: apps
  {{ include "app.syncPolicy.automated" . | nindent 2 }}
