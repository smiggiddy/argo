apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-redis
  namespace: argocd
  labels:
    apps: homelab
  annotations:
    {{ include "app.notifications" . | nindent 4 }}
spec:
  project: default
  source:
    path: './redis/overlays/nextcloud'
    repoURL: 'https://github.com/smiggiddy/argo'
    targetRevision: HEAD
  destination:
    namespace: nextcloud
    server: 'https://kubernetes.default.svc'
  {{ include "app.syncPolicy.automated" . | nindent 2 }}
