apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  labels:
    utilities: kube-system
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.mattermost: q51n59rsyjnyxexx5faeuuh8ua
    notifications.argoproj.io/subscribe.on-health-degraded.mattermost: q51n59rsyjnyxexx5faeuuh8ua
    notifications.argoproj.io/subscribe.on-sync-status-unknown.mattermost: q51n59rsyjnyxexx5faeuuh8ua

spec:
  destination:
    namespace: loki
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.6.2
    chart: alloy
    helm:
      values: |
        controller:
          type: daemonset
          volumes:
            extra:
              - name: journal
                hostPath:
                  path: /var/log/journal
                  type: DirectoryOrCreate
              - name: journal-run
                hostPath:
                  path: /run/log/journal
                  type: DirectoryOrCreate
              - name: machine-id
                hostPath:
                  path: /etc/machine-id
                  type: File
              - name: alloy-storage
                emptyDir: {}

        alloy:
          stabilityLevel: "generally-available"
          enableReporting: false
          storagePath: /var/lib/alloy

          mounts:
            varlog: false
            dockercontainers: false
            extra:
              - name: journal
                mountPath: /var/log/journal
                readOnly: true
              - name: journal-run
                mountPath: /run/log/journal
                readOnly: true
              - name: machine-id
                mountPath: /etc/machine-id
                readOnly: true
              - name: alloy-storage
                mountPath: /var/lib/alloy

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"

          configMap:
            create: true
            content: |-
              logging {
                level  = "info"
                format = "logfmt"
              }

              // ---------------------------------------------------------------
              // Pipeline 1: systemd journal logs
              // ---------------------------------------------------------------
              loki.source.journal "system" {
                path       = "/var/log/journal"
                max_age    = "1h"
                labels     = { job = "systemd-journal" }
                forward_to = [loki.process.journal_relabel.receiver]
                relabel_rules = loki.relabel.journal_labels.rules
              }

              loki.relabel "journal_labels" {
                forward_to = []

                rule {
                  source_labels = ["__journal__hostname"]
                  target_label  = "hostname"
                }

                rule {
                  source_labels = ["__journal__systemd_unit"]
                  target_label  = "unit"
                }
              }

              loki.process "journal_relabel" {
                forward_to = [loki.write.loki.receiver]

                stage.static_labels {
                  values = { cluster = "rpi-cluster" }
                }

                stage.label_keep {
                  values = ["job", "cluster", "hostname", "unit"]
                }
              }

              // ---------------------------------------------------------------
              // Pipeline 2: Kubernetes pod logs (via API, no hostPath needed)
              // ---------------------------------------------------------------
              discovery.kubernetes "pods" {
                role = "pod"
              }

              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets

                // Only scrape pods scheduled on this node
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  action        = "keep"
                  regex         = sys.env("HOSTNAME")
                }

                // Drop pods that are not running
                rule {
                  source_labels = ["__meta_kubernetes_pod_phase"]
                  action        = "drop"
                  regex         = "Pending|Succeeded|Failed|Unknown"
                }

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_log_stream"]
                  target_label  = "stream"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }

                // Prefer app.kubernetes.io/name, fall back to app label
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }

                rule {
                  source_labels = ["app", "__meta_kubernetes_pod_label_app"]
                  regex         = ";(.*)"
                  target_label  = "app"
                }
              }

              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pod_logs.output
                forward_to = [loki.process.pod_logs.receiver]
              }

              loki.process "pod_logs" {
                forward_to = [loki.write.loki.receiver]

                stage.static_labels {
                  values = { cluster = "rpi-cluster" }
                }
                stage.drop {
                  expression  = "kube-probe"
                  drop_counter_reason = "healthcheck"
                }
              }

              // ---------------------------------------------------------------
              // Shared writer
              // ---------------------------------------------------------------
              loki.write "loki" {
                endpoint {
                  url        = "http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push"
                  batch_size = "512KiB"
                  batch_wait = "5s"
                  headers    = { "X-Scope-OrgID" = "1" }
                }
                external_labels = { cluster = "rpi-cluster" }
              }

        global:
          podSecurityContext:
            supplementalGroups: [999]

        configReloader:
          enabled: true
          resources:
            requests:
              cpu: "10m"
              memory: "50Mi"
            limits:
              memory: "64Mi"

        rbac:
          create: true

        serviceAccount:
          create: true
          automountServiceAccountToken: true

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true
