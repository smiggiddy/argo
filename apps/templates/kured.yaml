apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kured
  namespace: argocd
  labels:
    apps: security 
  annotations:
    {{ include "app.notifications" . | nindent 4 }}
spec:
  project: default
  source:
    repoURL: ghcr.io/kubereboot/charts
    targetRevision: 5.11.0
    chart: kured
    helm:
      valuesObject:
        configuration:
          concurrency: 1
          rebootDays: ["fri", "sat"]
          startTime: "07:00"
          endTime: "21:00"
          timeZone: "America/New_York"
          drainTimeout: "15m"
          lockTtl: "120m"
          lockReleaseDelay: "15m"
          notifyUrl: <path:k8s/data/argocd/kured#notify_url>
        metrics:
          create: true
          labels:
            release: prometheus
        tolerations: [{"key": "node-role.kubernetes.io/master", "effect": "NoSchedule", "value": "true"}]

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - Replace=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
