apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootdev
  namespace: argocd
  labels:
    apps: utilities
  annotations:
    {{ include "app.notifications" . | nindent 4 }}
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: HEAD
    path: kustomizations/bootdev

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: bootdev

  {{ include "app.syncPolicy.automated" . | nindent 2 }}
