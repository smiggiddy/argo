apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vane
  namespace: argocd
  labels:
    apps: utilities
  annotations:
    {{ include "app.notifications" . | nindent 4 }}
    avp.kubernetes.io/ignore: "true"
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: HEAD
    path: ./kustomizations/vane
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  {{ include "app.syncPolicy.automated" . | nindent 2 }}
