apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer
  namespace: argocd
  labels:
    apps: utilities 
    smig: charts
  annotations:
    {{ include "app.notifications" . | nindent 4 }}

spec:
  project: default
  sources:
  - repoURL: 'https://djjudas21.github.io/charts/'
    targetRevision: 8.2.4
    chart: homer
    helm:
      valueFiles:
      - $values/homer/values.yaml

  - repoURL: 'https://gitea.smigz.com/smiggiddy/argocd-values.git'
    targetRevision: HEAD
    ref: values


  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: apps
  {{ include "app.syncPolicy.automated" . | nindent 2 }}
