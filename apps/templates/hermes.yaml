apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
  labels:
    apps: ai 
  annotations:
    {{ include "app.notifications" . | nindent 4 }}

spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: HEAD
    path: ./kustomizations/hermes
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: ai
  {{ include "app.syncPolicy.automated" . | nindent 2 }}
